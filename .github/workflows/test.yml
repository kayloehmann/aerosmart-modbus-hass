name: Test

# Manual only for now: modbus_connection (a dependency of this integration)
# hasn't shipped in a stable homeassistant PyPI release yet (see README
# "Known limitations"), so `pip install -r requirements_test.txt` can't
# resolve `homeassistant.components.modbus_connection` and every run fails
# on import, not on an actual test. Re-enable `push`/`pull_request` triggers
# once a stable release includes it.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: "pytest"
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install requirements
        run: python3 -m pip install -r requirements_test.txt

      - name: Run tests
        run: python3 -m pytest tests --verbose
